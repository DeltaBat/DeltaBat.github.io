name: Generate audio

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'scripts/generate-audio.mjs'

permissions:
  contents: write

# Avoid two runs racing each other
concurrency:
  group: generate-audio
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate missing audio
        env:
          GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }}
        run: node scripts/generate-audio.mjs

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain audio/)" ]]; then
            git add audio/
            git commit -m "chore: auto-generate audio [skip ci]"
            git push
          else
            echo "No new audio to commit."
          fi
